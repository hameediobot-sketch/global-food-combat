<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Food Combat</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        #gameCanvas {
            border: 4px solid #fff;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            background: #87CEEB;
        }
        
        #info {
            color: white;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🍽️ Global Food Combat 🍽️</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="characterSelection" style="margin-top: 20px;">
        <h2 style="color: white; text-align: center;">Choose Your Fighter!</h2>
        <div style="display: flex; gap: 20px; justify-content: center;">
            <button class="character-btn" data-character="pizza" style="font-size: 48px; padding: 20px; border: none; border-radius: 10px; cursor: pointer; background: #fff;">🍕</button>
            <button class="character-btn" data-character="burger" style="font-size: 48px; padding: 20px; border: none; border-radius: 10px; cursor: pointer; background: #fff;">🍔</button>
            <button class="character-btn" data-character="taco" style="font-size: 48px; padding: 20px; border: none; border-radius: 10px; cursor: pointer; background: #fff;">🌮</button>
            <button class="character-btn" data-character="sushi" style="font-size: 48px; padding: 20px; border: none; border-radius: 10px; cursor: pointer; background: #fff;">🍣</button>
        </div>
    </div>
    <div id="info">Phase 4: Enemy AI and Combat Test</div>

    <script>
        // Phase 1 & 2: Canvas Setup and Character Selection
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game State
        let selectedCharacter = null;
        // Phase 2: Character Selection Variables and Functions (Global Scope)
        window.selectedCharacter = null;
        
        // Character selection functionality (Global Scope)
        window.selectCharacter = function(character) {
            window.selectedCharacter = character;
            console.log('Character selected:', character);
            
            // Update UI to show selection
            document.getElementById('info').textContent = `Selected: ${getCharacterEmoji(character)} ${character.toUpperCase()}`;
            
            // Highlight selected button
            document.querySelectorAll('.character-btn').forEach(btn => {
                btn.style.background = btn.dataset.character === character ? '#90EE90' : '#fff';
            });
            
            renderCharacterSelection();
        }
        
        // Phase 3: Player Object and Movement
        window.player = {
            x: 400,
            y: 300,
            size: 40,
            speed: 200, // pixels per second
            character: null
        };
        
        // Movement input tracking  
        window.keys = {
            w: false, a: false, s: false, d: false,
            ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false
        };
        
        // Game loop timing
        window.lastTime = 0;
        window.gameRunning = false;
        
        // Initialize player with selected character
        window.startGame = function() {
            if (!window.selectedCharacter) {
                console.log('No character selected!');
                return;
            }
            
            window.player.character = window.selectedCharacter;
            window.player.x = canvas.width / 2;
            window.player.y = canvas.height / 2;
            window.gameRunning = true;
            window.lastTime = performance.now();
            
            console.log('Game started with:', window.selectedCharacter);
            window.gameLoop(performance.now());
        }
        
        // Player update function
        window.updatePlayer = function(deltaTime) {
            const dt = deltaTime / 1000; // Convert to seconds
            
            // Movement input
            let moveX = 0, moveY = 0;
            
            if (window.keys.w || window.keys.ArrowUp) moveY -= window.player.speed * dt;
            if (window.keys.s || window.keys.ArrowDown) moveY += window.player.speed * dt;
            if (window.keys.a || window.keys.ArrowLeft) moveX -= window.player.speed * dt;
            if (window.keys.d || window.keys.ArrowRight) moveX += window.player.speed * dt;
            
            // Update position
            window.player.x += moveX;
            window.player.y += moveY;
            
            // Boundary collision
            const halfSize = window.player.size / 2;
            if (window.player.x - halfSize < 0) window.player.x = halfSize;
            if (window.player.x + halfSize > canvas.width) window.player.x = canvas.width - halfSize;
            if (window.player.y - halfSize < 0) window.player.y = halfSize;
            if (window.player.y + halfSize > canvas.height) window.player.y = canvas.height - halfSize;
        }
        
        // Player render function
        window.renderPlayer = function() {
            if (!window.player.character) return;
            
            ctx.save();
            ctx.font = `${window.player.size}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Draw player character
            ctx.fillText(
                getCharacterEmoji(window.player.character),
                window.player.x,
                window.player.y
            );
            
            ctx.restore();
        }
        
        // Game loop
        window.gameLoop = function(currentTime) {
            if (!window.gameRunning) return;
            
            const deltaTime = currentTime - window.lastTime;
            window.lastTime = currentTime;
            
            // Update
            window.updatePlayer(deltaTime);
            window.updateEnemies(deltaTime);
            window.checkCollisions();
            
            // Render
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            window.renderPlayer();
            window.renderEnemies();
            window.renderUI();
            
            // Continue loop
            requestAnimationFrame(window.gameLoop);
        }
        
        // Phase 4: Enemy AI and Combat System
        window.enemies = [];
        window.gameStats = {
            score: 0,
            health: 100,
            enemiesDefeated: 0
        };
        
        // Enemy types with different behaviors
        window.enemyTypes = {
            'angry_veggie': { emoji: '🥕', speed: 80, damage: 10, points: 10 },
            'fast_fruit': { emoji: '🍎', speed: 120, damage: 5, points: 15 },
            'slow_dessert': { emoji: '🍰', speed: 50, damage: 20, points: 25 },
            'sneaky_snack': { emoji: '🥨', speed: 100, damage: 15, points: 20 }
        };
        
        // Create enemy object
        window.createEnemy = function() {
            const types = Object.keys(window.enemyTypes);
            const randomType = types[Math.floor(Math.random() * types.length)];
            const enemyData = window.enemyTypes[randomType];
            
            // Spawn at random edge of canvas
            let x, y;
            const edge = Math.floor(Math.random() * 4); // 0=top, 1=right, 2=bottom, 3=left
            
            switch(edge) {
                case 0: // top
                    x = Math.random() * canvas.width;
                    y = -20;
                    break;
                case 1: // right
                    x = canvas.width + 20;
                    y = Math.random() * canvas.height;
                    break;
                case 2: // bottom
                    x = Math.random() * canvas.width;
                    y = canvas.height + 20;
                    break;
                case 3: // left
                    x = -20;
                    y = Math.random() * canvas.height;
                    break;
            }
            
            return {
                x: x,
                y: y,
                type: randomType,
                size: 30,
                speed: enemyData.speed,
                damage: enemyData.damage,
                points: enemyData.points,
                emoji: enemyData.emoji,
                lastSpawn: Date.now()
            };
        }
        
        // Enemy spawning
        window.lastEnemySpawn = 0;
        window.enemySpawnInterval = 2000; // 2 seconds initially
        
        window.spawnEnemies = function() {
            const now = Date.now();
            if (now - window.lastEnemySpawn > window.enemySpawnInterval) {
                window.enemies.push(window.createEnemy());
                window.lastEnemySpawn = now;
                
                // Gradually increase difficulty by spawning more frequently
                if (window.enemySpawnInterval > 500) {
                    window.enemySpawnInterval -= 50;
                }
            }
        }
        
        // Enemy AI movement
        window.updateEnemies = function(deltaTime) {
            const dt = deltaTime / 1000;
            
            window.spawnEnemies();
            
            // Update each enemy
            for (let i = window.enemies.length - 1; i >= 0; i--) {
                const enemy = window.enemies[i];
                
                // Calculate direction to player
                const dx = window.player.x - enemy.x;
                const dy = window.player.y - enemy.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // Move toward player
                if (distance > 0) {
                    enemy.x += (dx / distance) * enemy.speed * dt;
                    enemy.y += (dy / distance) * enemy.speed * dt;
                }
                
                // Remove enemies that are too far off screen
                if (enemy.x < -100 || enemy.x > canvas.width + 100 || 
                    enemy.y < -100 || enemy.y > canvas.height + 100) {
                    window.enemies.splice(i, 1);
                }
            }
        }
        
        // Collision detection
        window.checkCollisions = function() {
            for (let i = window.enemies.length - 1; i >= 0; i--) {
                const enemy = window.enemies[i];
                
                // Check collision with player
                const dx = window.player.x - enemy.x;
                const dy = window.player.y - enemy.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const collisionDistance = (window.player.size + enemy.size) / 2;
                
                if (distance < collisionDistance) {
                    // Collision detected!
                    window.handleCombat(enemy, i);
                }
            }
        }
        
        // Combat mechanics
        window.handleCombat = function(enemy, enemyIndex) {
            // Player takes damage
            window.gameStats.health -= enemy.damage;
            
            // Player gets points for defeating enemy
            window.gameStats.score += enemy.points;
            window.gameStats.enemiesDefeated++;
            
            // Remove the enemy
            window.enemies.splice(enemyIndex, 1);
            
            console.log(`Combat! -${enemy.damage} health, +${enemy.points} points`);
            
            // Check game over
            if (window.gameStats.health <= 0) {
                window.gameOver();
            }
        }
        
        // Render enemies
        window.renderEnemies = function() {
            window.enemies.forEach(enemy => {
                ctx.save();
                ctx.font = `${enemy.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.fillText(enemy.emoji, enemy.x, enemy.y);
                ctx.restore();
            });
        }
        
        // Render UI (score, health)
        window.renderUI = function() {
            ctx.save();
            ctx.fillStyle = '#333';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            
            ctx.fillText(`Health: ${window.gameStats.health}`, 10, 30);
            ctx.fillText(`Score: ${window.gameStats.score}`, 10, 60);
            ctx.fillText(`Enemies: ${window.gameStats.enemiesDefeated}`, 10, 90);
            ctx.fillText(`Active Enemies: ${window.enemies.length}`, 10, 120);
            
            ctx.restore();
        }
        
        // Game over
        window.gameOver = function() {
            window.gameRunning = false;
            
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#fff';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER!', canvas.width/2, canvas.height/2 - 50);
            
            ctx.font = '24px Arial';
            ctx.fillText(`Final Score: ${window.gameStats.score}`, canvas.width/2, canvas.height/2 + 10);
            ctx.fillText(`Enemies Defeated: ${window.gameStats.enemiesDefeated}`, canvas.width/2, canvas.height/2 + 40);
            ctx.fillText('Refresh to play again', canvas.width/2, canvas.height/2 + 80);
            
            ctx.restore();
            
            console.log(`Game Over! Final Score: ${window.gameStats.score}`);
        }
        
        function getCharacterEmoji(character) {
            const emojis = {
                pizza: '🍕',
                burger: '🍔', 
                taco: '🌮',
                sushi: '🍣'
            };
            return emojis[character] || '❓';
        }
        
        function renderCharacterSelection() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (window.selectedCharacter) {
                // Show selected character large in center
                ctx.fillStyle = '#FFD700';
                ctx.font = '120px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(getCharacterEmoji(window.selectedCharacter), 400, 250);
                
                ctx.fillStyle = '#333';
                ctx.font = '36px Arial';
                ctx.fillText(`${window.selectedCharacter.toUpperCase()} READY!`, 400, 350);
                
                ctx.font = '24px Arial';
                ctx.fillText('Phase 2: Character Selection ✅', 400, 500);
            } else {
                // Show all characters
                renderTest();
            }
        }
        
        // Event listeners for character selection
        function initializeCharacterSelection() {
            console.log('Initializing character selection...');
            document.querySelectorAll('.character-btn').forEach(btn => {
                console.log('Adding listener to:', btn.dataset.character);
                btn.addEventListener('click', function() {
                    console.log('Button clicked:', this.dataset.character);
                    selectCharacter(this.dataset.character);
                });
            });
        }
        
        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeCharacterSelection);
        } else {
            initializeCharacterSelection();
        }
        
        // Phase 3: Keyboard Event Listeners
        document.addEventListener('keydown', function(event) {
            if (event.key in window.keys) {
                window.keys[event.key] = true;
                event.preventDefault(); // Prevent scrolling
            }
        });
        
        document.addEventListener('keyup', function(event) {
            if (event.key in window.keys) {
                window.keys[event.key] = false;
                event.preventDefault();
            }
        });
        
        // Auto-start game when character selected
        const originalSelectCharacter = window.selectCharacter;
        window.selectCharacter = function(character) {
            originalSelectCharacter(character);
            
            // Auto-start game after selection
            setTimeout(() => {
                window.startGame();
                document.getElementById('info').textContent = `Fighting as ${getCharacterEmoji(character)}! Use WASD to avoid enemies - collisions = damage + points!`;
            }, 500);
        }
        
        // Test basic rendering
        function renderTest() {
            // Clear canvas
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw test elements
            ctx.fillStyle = '#FFD700';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🍕', 200, 200);
            ctx.fillText('🍔', 400, 200);
            ctx.fillText('🌮', 600, 200);
            ctx.fillText('🍣', 400, 350);
            
            // Draw test message
            ctx.fillStyle = '#333';
            ctx.font = '24px Arial';
            ctx.fillText('Choose your character above!', 400, 500);
        }
        
        // Run test immediately
        renderTest();
        
        
        // Global test function for verification
        window.testPhase1 = function() {
            console.log('Phase 1 Test Results:');
            console.log('✅ Canvas element exists:', !!canvas);
            console.log('✅ 2D context available:', !!ctx);
            console.log('✅ Canvas dimensions:', canvas.width + 'x' + canvas.height);
            console.log('✅ Rendering function works:', typeof renderTest === 'function');
            
            // Re-render to confirm
            renderTest();
            return true;
        };
        
        // Phase 2 test function
        window.testPhase2 = function() {
            console.log('Phase 2 Test Results:');
            console.log('✅ Character buttons exist:', document.querySelectorAll('.character-btn').length);
            console.log('✅ Select function exists:', typeof window.selectCharacter === 'function');
            console.log('✅ Current selection:', window.selectedCharacter || 'none');
            
            console.log('Testing pizza selection...');
            window.selectCharacter('pizza');
            console.log('✅ Pizza selected:', window.selectedCharacter === 'pizza');
            
            return window.selectedCharacter === 'pizza';
        }
        
        window.testPhase3 = function() {
            console.log('Phase 3 Test Results:');
            console.log('✅ Player object exists:', !!window.player);
            console.log('✅ Movement keys object:', !!window.keys);
            console.log('✅ Game loop function:', typeof window.gameLoop === 'function');
            console.log('✅ Start game function:', typeof window.startGame === 'function');
            
            // Test character selection and game start
            if (!window.selectedCharacter) {
                console.log('Testing character selection...');
                window.selectCharacter('pizza');
            }
            
            // Wait for game to start then test movement
            setTimeout(() => {
                console.log('✅ Game running:', window.gameRunning);
                console.log('✅ Player character set:', window.player.character);
                console.log('✅ Initial position:', `${window.player.x}, ${window.player.y}`);
                
                // Test movement simulation
                console.log('Testing movement simulation...');
                const oldX = window.player.x;
                window.keys.d = true; // Simulate right key press
                window.updatePlayer(16.67); // Simulate one frame (60fps)
                window.keys.d = false;
                
                console.log('✅ Movement works:', window.player.x > oldX);
                console.log(`Player moved from ${oldX} to ${window.player.x}`);
                
            }, 1000);
            
            return true;
        }
        
        window.testPhase4 = function() {
            console.log('Phase 4 Test Results:');
            console.log('✅ Enemy system exists:', !!window.enemies);
            console.log('✅ Game stats tracking:', !!window.gameStats);
            console.log('✅ Enemy types defined:', Object.keys(window.enemyTypes).length, 'types');
            console.log('✅ Enemy creation function:', typeof window.createEnemy === 'function');
            console.log('✅ Combat system function:', typeof window.handleCombat === 'function');
            console.log('✅ Collision detection:', typeof window.checkCollisions === 'function');
            
            // Test character selection and game start
            if (!window.selectedCharacter) {
                console.log('Testing character selection...');
                window.selectCharacter('pizza');
            }
            
            // Wait for game to start then test enemy system
            setTimeout(() => {
                console.log('✅ Game running:', window.gameRunning);
                console.log('✅ Current health:', window.gameStats.health);
                console.log('✅ Current score:', window.gameStats.score);
                
                // Test enemy creation
                console.log('Testing enemy creation...');
                const testEnemy = window.createEnemy();
                console.log('✅ Enemy created:', testEnemy.type, testEnemy.emoji);
                console.log('✅ Enemy has AI properties:', !!testEnemy.speed && !!testEnemy.damage);
                
                // Test spawning
                window.enemies.push(testEnemy);
                console.log('✅ Enemy added to game:', window.enemies.length, 'active enemies');
                
                // Test collision detection
                console.log('Testing collision system...');
                const oldHealth = window.gameStats.health;
                const oldScore = window.gameStats.score;
                
                // Position enemy next to player for collision test
                testEnemy.x = window.player.x + 5;
                testEnemy.y = window.player.y + 5;
                window.checkCollisions();
                
                console.log('✅ Collision handled:', 
                    window.gameStats.health < oldHealth, 
                    'health changed,',
                    window.gameStats.score > oldScore,
                    'score changed');
                
                console.log('Phase 4: Enemy AI and Combat System ✅ WORKING!');
                
            }, 1500);
            
            return true;
        }
        
        console.log('Phase 1, 2, 3 & 4: Complete game with enemies and combat ready');
    </script>
</body>
</html>
